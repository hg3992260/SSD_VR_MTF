name: Build SSD+VR Fusion Viewer EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole `
            --name="SSD_VR_Fusion_Viewer" `
            --icon="logo.jpg" `
            --add-data="scientific.json;." `
            --add-data="dark.qss;." `
            --add-data="presets.xml;." `
            --add-data="logo.jpg;." `
            --add-data="segmentation;segmentation" `
            --add-binary="exposure-render-master/exposure-render-master/Source/build/Release/ErCore.dll;." `
            --collect-all=PySide6 `
            --collect-all=vtkmodules `
            --collect-all=SimpleITK `
            --hidden-import=PyCt6 `
            --hidden-import=vtkmodules.qt.QVTKRenderWindowInteractor `
            --hidden-import=scipy.ndimage `
            --hidden-import=skimage.restoration `
            --hidden-import=skimage.filters `
            --hidden-import=nibabel `
            --exclude-module=tkinter `
            ssd_vr_viewer.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SSD_VR_Fusion_Viewer
          path: dist/SSD_VR_Fusion_Viewer.exe
