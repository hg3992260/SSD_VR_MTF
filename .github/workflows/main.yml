name: Build SSD+VR Fusion Viewer EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cupy-cuda12x
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole `
            --name="SSD_VR_Fusion_Viewer" `
            --icon="logo.jpg" `
            --add-data="scientific.json;." `
            --add-data="dark.qss;." `
            --add-data="presets.xml;." `
            --add-data="logo.jpg;." `
            --add-data="segmentation;segmentation" `
            --add-binary="exposure-render-master/exposure-render-master/Source/build/Release/ErCore.dll;." `
            --collect-all=PySide6 `
            --collect-all=PyCt6 `
            --collect-submodules=PyCt6 `
            --collect-data=PyCt6 `
            --collect-all=vtkmodules `
            --collect-all=SimpleITK `
            --hidden-import=PyCt6 `
            --hidden-import=PyCt6.widgets `
            --hidden-import=PyCt6.widgets.c_button `
            --hidden-import=PyCt6.widgets.c_label `
            --hidden-import=PyCt6.widgets.c_line_edit `
            --hidden-import=PyCt6.widgets.c_combo_box `
            --hidden-import=PyCt6.widgets.c_slider `
            --hidden-import=PyCt6.widgets.c_frame `
            --hidden-import=PyCt6.widgets.c_text_edit `
            --hidden-import=PyCt6.windows `
            --hidden-import=PyCt6.windows.c_main_window `
            --hidden-import=PyCt6.windows.c_toplevel `
            --hidden-import=PyCt6.appearance `
            --hidden-import=PyCt6.appearance.theme_manager `
            --hidden-import=PyCt6.appearance.mode_manager `
            --hidden-import=PySide6.QtSvg `
            --hidden-import=PySide6.QtSvgWidgets `
            --hidden-import=vtkmodules.qt.QVTKRenderWindowInteractor `
            --hidden-import=scipy.ndimage `
            --hidden-import=skimage.restoration `
            --hidden-import=skimage.filters `
            --hidden-import=nibabel `
            --exclude-module=tkinter `
            ssd_vr_viewer.py

      - name: Create Release and Upload EXE
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SSD_VR_Fusion_Viewer.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
