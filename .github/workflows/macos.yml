name: Build SSD+VR for macOS (DMG + App)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.10"
          channels: conda-forge,defaults

      - name: Install deps
        shell: bash -el {0}
        run: |
          conda install -y numpy scipy matplotlib
          conda install -y -c conda-forge vtk
          pip install PySide6 PyCt6 nibabel scikit-image SimpleITK pyinstaller
          brew install create-dmg

      - name: Build .app from spec
        shell: bash -el {0}
        run: pyinstaller --clean ssd_vr_viewer_macos.spec

      - name: Verify Qt plugins
        shell: bash -el {0}
        run: |
          echo "=== qcocoa ==="
          find "dist/SSD_VR_Fusion_Viewer.app" -name "libqcocoa*" 2>/dev/null || echo "MISSING"
          echo "=== qt.conf ==="
          cat "dist/SSD_VR_Fusion_Viewer.app/Contents/Resources/qt.conf" 2>/dev/null || echo "MISSING"

      - name: Package DMG
        run: |
          create-dmg \
            --volname "SSD_VR_Fusion_Viewer" \
            --volicon "logo.jpg" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 150 \
            "dist/SSD_VR_Fusion_Viewer.dmg" \
            "dist/SSD_VR_Fusion_Viewer.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: SSD_VR_Fusion_Viewer_macOS
          path: dist/SSD_VR_Fusion_Viewer.dmg

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: SSD_VR_Fusion_Viewer_app
          path: dist/SSD_VR_Fusion_Viewer.app

      - name: Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SSD_VR_Fusion_Viewer.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
